<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属神秘礼物</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f0e6ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: "微软雅黑", sans-serif;
        }
        /* 礼物盒样式 */
        .gift-box {
            position: relative;
            width: 250px;
            height: 200px;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        .box-top {
            width: 250px;
            height: 50px;
            background-color: #ff3366;
            position: absolute;
            top: 0;
            border-radius: 5px 5px 0 0;
            z-index: 2;
            transition: transform 0.5s ease;
        }
        .box-body {
            width: 250px;
            height: 150px;
            background-color: #ff6699;
            position: absolute;
            bottom: 0;
            border-radius: 0 0 5px 5px;
        }
        .ribbon {
            position: absolute;
            background-color: #fff;
            z-index: 3;
        }
        .ribbon-v {
            width: 30px;
            height: 200px;
            left: 110px;
            top: 0;
        }
        .ribbon-h {
            width: 250px;
            height: 30px;
            left: 0;
            top: 85px;
        }
        /* 礼物盒打开动画 */
        .gift-box.open .box-top {
            transform: translateY(-80px) rotateX(30deg);
        }
        /* 密码输入框 */
        .password-box {
            margin-bottom: 20px;
            display: none;
        }
        #pwd-input {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #ff6699;
            border-radius: 5px;
            outline: none;
        }
        #pwd-btn {
            padding: 10px 20px;
            margin-left: 10px;
            background-color: #ff6699;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        /* 礼物内容（新增动态图片样式） */
        .gift-content {
            display: none;
            text-align: center;
            color: #ff3366;
            margin-top: 30px;
        }
        .gift-content h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .gift-content p {
            font-size: 20px;
            margin-bottom: 15px;
        }
        .dynamic-img {
            width: 300px;
            height: auto;
            /* 图片缩放动画 */
            animation: scale 3s infinite alternate;
        }
        @keyframes scale {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <!-- 背景音乐（自动播放且循环） -->
    <audio src="https://music.163.com/song/media/outer/url?id=186016.mp3" autoplay loop preload="auto">
        您的浏览器不支持音频播放
    </audio>

    <div class="password-box" id="pwdBox">
        <input type="text" id="pwd-input" placeholder="请输入礼物密码（默认：123456）">
        <button id="pwd-btn">验证</button>
    </div>

    <div class="gift-box" id="giftBox">
        <div class="box-top"></div>
        <div class="box-body"></div>
        <div class="ribbon ribbon-v"></div>
        <div class="ribbon ribbon-h"></div>
    </div>

    <div class="gift-content" id="giftContent">
        <h2>🎉 恭喜解锁礼物！</h2>
        <p>愿你每天都有小惊喜～</p>
        <!-- 动态图片，可替换为自己的图片链接 -->
        <img src="https://picsum.photos/seed/gift/600/400" class="dynamic-img" alt="惊喜礼物图">
    </div>

    <script>
        const pwdBox = document.getElementById('pwdBox');
        const pwdInput = document.getElementById('pwd-input');
        const pwdBtn = document.getElementById('pwd-btn');
        const giftBox = document.getElementById('giftBox');
        const giftContent = document.getElementById('giftContent');
        const correctPwd = "123456";

        window.onload = () => {
            pwdBox.style.display = "block";
        };

        pwdBtn.onclick = () => {
            if (pwdInput.value === correctPwd) {
                pwdBox.style.display = "none";
                giftBox.style.display = "block";
            } else {
                alert("密码错误！再试试～");
                pwdInput.value = "";
            }
        };

        giftBox.onclick = () => {
            giftBox.classList.add('open');
            setTimeout(() => {
                giftContent.style.display = "block";
            }, 600);
        };
    </script>
</body>
</html>
